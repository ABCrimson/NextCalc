name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  NODE_VERSION: '26'

jobs:
  # ---------------------------------------------------------------------------
  # Install dependencies (shared across jobs via cache)
  # ---------------------------------------------------------------------------
  install:
    name: Install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @nextcalc/database db:generate

      # Cache the entire node_modules tree (including generated Prisma client)
      # so downstream jobs don't need to re-install.
      - name: Save node_modules cache
        uses: actions/cache/save@v6
        with:
          path: |
            node_modules
            apps/*/node_modules
            apps/workers/*/node_modules
            packages/*/node_modules
            packages/database/src/generated
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}

  # ---------------------------------------------------------------------------
  # Lint (Biome)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v6
        with:
          path: |
            node_modules
            apps/*/node_modules
            apps/workers/*/node_modules
            packages/*/node_modules
            packages/database/src/generated
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Run Biome lint
        run: pnpm turbo run lint

  # ---------------------------------------------------------------------------
  # Typecheck (tsc --noEmit across all packages via turbo)
  #
  # TypeScript 7 (native compiler) is the gate for every package except:
  # - @nextcalc/web: Next.js build-time checking + graphql-codegen need the
  #   TypeScript JS API, which ships in TS 7.1 (web stays on tsc 6.0.3)
  # - @nextcalc/plot-engine: three.js TSL node-union types hang the native
  #   checker (upstream typescript-go limitation; stays on tsc 6.0.3)
  # Re-unify on TS 7.x when Next.js supports the native compiler and the
  # TSL type expansion is fixed upstream.
  # ---------------------------------------------------------------------------
  typecheck:
    name: Typecheck
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v6
        with:
          path: |
            node_modules
            apps/*/node_modules
            apps/workers/*/node_modules
            packages/*/node_modules
            packages/database/src/generated
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Restore Turbo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: turbo-typecheck-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-typecheck-${{ runner.os }}-

      - name: Run typecheck
        run: pnpm turbo run typecheck

  # ---------------------------------------------------------------------------
  # Test (Vitest across math-engine, plot-engine, web, api)
  # ---------------------------------------------------------------------------
  test:
    name: Test
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v6
        with:
          path: |
            node_modules
            apps/*/node_modules
            apps/workers/*/node_modules
            packages/*/node_modules
            packages/database/src/generated
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Restore Turbo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: turbo-test-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-test-${{ runner.os }}-

      - name: Run tests
        run: |
          # Vitest (web) may hang in process cleanup AFTER printing results
          # (known issue), so the run is bounded by `timeout`. Exit 124 is
          # accepted ONLY when the captured log shows no failures and no
          # worker/unhandled errors — a genuinely hanging test also produces
          # exit 124, and that must fail the job. (An unconditional
          # 124-is-success guard previously masked an infinite loop in
          # math-engine's polynomial LCM for the suite's entire lifetime.)
          timeout 300 pnpm turbo run test 2>&1 | tee test-output.log
          code=${PIPESTATUS[0]}
          if [ "$code" -eq 124 ]; then
            if grep -qE "(Tests|Test Files)[^|]*failed|Unhandled Error|Worker exited unexpectedly" test-output.log; then
              echo "::error::Test run timed out WITH failures or worker errors — not a benign cleanup hang"
              exit 1
            fi
            echo "::notice::Tests passed but process cleanup timed out (known vitest issue)"
            exit 0
          fi
          exit "$code"

  # ---------------------------------------------------------------------------
  # Build (full production build via turbo)
  # ---------------------------------------------------------------------------
  build:
    name: Build
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v6
        with:
          path: |
            node_modules
            apps/*/node_modules
            apps/workers/*/node_modules
            packages/*/node_modules
            packages/database/src/generated
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Restore Turbo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: turbo-build-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-build-${{ runner.os }}-

      - name: Build all packages
        env:
          AUTH_SECRET: ci-build-placeholder
        run: pnpm turbo run build
