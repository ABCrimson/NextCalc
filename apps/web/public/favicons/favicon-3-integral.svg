<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background -->
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1224"/>
      <stop offset="50%" stop-color="#111832"/>
      <stop offset="100%" stop-color="#0F1629"/>
    </linearGradient>

    <!-- Integral gradient (blue to purple) -->
    <linearGradient id="int-grad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#9B5CFF"/>
      <stop offset="30%" stop-color="#6B5CFF"/>
      <stop offset="70%" stop-color="#3B47FF"/>
      <stop offset="100%" stop-color="#3B8CFF"/>
    </linearGradient>

    <!-- Accent gradient for dx -->
    <linearGradient id="dx-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#10D4A0"/>
    </linearGradient>

    <!-- Center glow -->
    <radialGradient id="glow3" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#6B5CFF" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#3B47FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3B47FF" stop-opacity="0"/>
    </radialGradient>

    <!-- Glass panel -->
    <linearGradient id="glass3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.015"/>
    </linearGradient>

    <!-- Integral glow filter -->
    <filter id="intGlow" x="-30%" y="-15%" width="160%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feComponentTransfer in="blur">
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="squircle3">
      <rect width="512" height="512" rx="115" ry="115"/>
    </clipPath>
  </defs>

  <g clip-path="url(#squircle3)">
    <!-- Background -->
    <rect width="512" height="512" fill="url(#bg3)"/>

    <!-- Center glow -->
    <rect width="512" height="512" fill="url(#glow3)"/>

    <!-- Horizontal math lines (like ruled paper, very subtle) -->
    <g opacity="0.025">
      <line x1="80" y1="160" x2="432" y2="160" stroke="#ffffff" stroke-width="0.75"/>
      <line x1="80" y1="210" x2="432" y2="210" stroke="#ffffff" stroke-width="0.75"/>
      <line x1="80" y1="260" x2="432" y2="260" stroke="#ffffff" stroke-width="0.75"/>
      <line x1="80" y1="310" x2="432" y2="310" stroke="#ffffff" stroke-width="0.75"/>
      <line x1="80" y1="360" x2="432" y2="360" stroke="#ffffff" stroke-width="0.75"/>
    </g>

    <!-- Glass panel -->
    <rect x="100" y="70" width="312" height="372" rx="32" fill="url(#glass3)" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

    <!-- Integral symbol - elegant calligraphic form -->
    <g filter="url(#intGlow)">
      <path d="M 290 80
               C 310 80, 330 95, 330 120
               C 330 140, 318 150, 300 160
               L 240 380
               C 228 405, 210 430, 190 435
               C 170 440, 155 430, 155 415
               C 155 400, 170 395, 180 400
               C 190 405, 195 410, 200 400
               L 270 145
               C 278 125, 285 110, 275 100
               C 268 92, 260 98, 258 108
               C 256 116, 246 118, 242 112
               C 238 104, 252 80, 290 80 Z"
            fill="url(#int-grad)"/>
    </g>

    <!-- f(x) text - elegant -->
    <text x="310" y="280" font-family="'Georgia', 'Times New Roman', serif" font-size="52" font-style="italic" fill="url(#dx-grad)" opacity="0.8">f</text>

    <!-- Top shine -->
    <rect x="100" y="70" width="312" height="186" rx="32" fill="#ffffff" fill-opacity="0.015"/>

    <!-- Top border accent -->
    <line x1="132" y1="71" x2="380" y2="71" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" stroke-linecap="round"/>

    <!-- Small accent circles (like math notation dots) -->
    <circle cx="160" cy="160" r="3" fill="#3B47FF" opacity="0.4"/>
    <circle cx="160" cy="380" r="3" fill="#9B5CFF" opacity="0.4"/>
  </g>

  <!-- Outer border -->
  <rect width="512" height="512" rx="115" ry="115" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
</svg>