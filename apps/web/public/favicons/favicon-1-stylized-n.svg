<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient (deep space) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F1629"/>
      <stop offset="50%" stop-color="#131B36"/>
      <stop offset="100%" stop-color="#0D1224"/>
    </linearGradient>

    <!-- Primary blue-to-purple gradient for the N -->
    <linearGradient id="n-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B47FF"/>
      <stop offset="40%" stop-color="#6B5CFF"/>
      <stop offset="100%" stop-color="#9B5CFF"/>
    </linearGradient>

    <!-- Glow gradient -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B47FF" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#6B5CFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#9B5CFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Glass panel gradient -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>

    <!-- Subtle noise filter -->
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend mode="overlay" in="SourceGraphic" in2="grayNoise"/>
    </filter>

    <!-- Soft shadow for depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow filter for the N -->
    <filter id="nGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur"/>
      <feComponentTransfer in="blur">
        <feFuncA type="linear" slope="0.6"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Squircle clip path -->
    <clipPath id="squircle">
      <rect width="512" height="512" rx="115" ry="115"/>
    </clipPath>
  </defs>

  <!-- Clipped container -->
  <g clip-path="url(#squircle)">
    <!-- Background -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Subtle grid pattern -->
    <g opacity="0.03">
      <line x1="128" y1="0" x2="128" y2="512" stroke="#ffffff" stroke-width="1"/>
      <line x1="256" y1="0" x2="256" y2="512" stroke="#ffffff" stroke-width="1"/>
      <line x1="384" y1="0" x2="384" y2="512" stroke="#ffffff" stroke-width="1"/>
      <line x1="0" y1="128" x2="512" y2="128" stroke="#ffffff" stroke-width="1"/>
      <line x1="0" y1="256" x2="512" y2="256" stroke="#ffffff" stroke-width="1"/>
      <line x1="0" y1="384" x2="512" y2="384" stroke="#ffffff" stroke-width="1"/>
    </g>

    <!-- Ambient glow behind the N -->
    <ellipse cx="256" cy="256" rx="200" ry="200" fill="url(#glow)"/>

    <!-- Frosted glass panel -->
    <rect x="86" y="86" width="340" height="340" rx="40" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>

    <!-- The N - bold geometric letterform -->
    <g filter="url(#nGlow)">
      <path d="M 160 380 L 160 132 L 196 132 L 340 330 L 340 132 L 376 132 L 376 380 L 340 380 L 196 182 L 196 380 Z" fill="url(#n-grad)"/>
    </g>

    <!-- Top-left shine accent -->
    <rect x="86" y="86" width="340" height="170" rx="40" fill="url(#glass)" opacity="0.5"/>

    <!-- Border highlight (top edge) -->
    <line x1="126" y1="87" x2="386" y2="87" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" stroke-linecap="round"/>

    <!-- Accent dot (top-right) -->
    <circle cx="400" cy="112" r="6" fill="#3B47FF" opacity="0.6"/>
  </g>

  <!-- Outer rounded rect border -->
  <rect width="512" height="512" rx="115" ry="115" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
</svg>