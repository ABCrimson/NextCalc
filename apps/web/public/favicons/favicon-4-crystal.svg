<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background -->
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F1629"/>
      <stop offset="100%" stop-color="#0D1224"/>
    </linearGradient>

    <!-- Crystal face gradients (different glass panels) -->
    <linearGradient id="face-a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B47FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6B5CFF" stop-opacity="0.3"/>
    </linearGradient>

    <linearGradient id="face-b" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9B5CFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3B47FF" stop-opacity="0.25"/>
    </linearGradient>

    <linearGradient id="face-c" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B8CFF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#10D4A0" stop-opacity="0.2"/>
    </linearGradient>

    <linearGradient id="face-d" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#6B5CFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#9B5CFF" stop-opacity="0.2"/>
    </linearGradient>

    <linearGradient id="face-e" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3B8CFF" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Central glow -->
    <radialGradient id="glow4" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#6B5CFF" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#3B47FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3B47FF" stop-opacity="0"/>
    </radialGradient>

    <!-- Crystal glow filter -->
    <filter id="crystalGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feComponentTransfer in="blur">
        <feFuncA type="linear" slope="0.45"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Edge highlight filter -->
    <filter id="edgeGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>

    <clipPath id="squircle4">
      <rect width="512" height="512" rx="115" ry="115"/>
    </clipPath>
  </defs>

  <g clip-path="url(#squircle4)">
    <!-- Background -->
    <rect width="512" height="512" fill="url(#bg4)"/>

    <!-- Ambient glow -->
    <rect width="512" height="512" fill="url(#glow4)"/>

    <!-- Crystal shape - hexagonal gem with facets -->
    <g filter="url(#crystalGlow)">
      <!-- Top facet -->
      <polygon points="256,72 368,170 256,210 144,170" fill="url(#face-d)" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>

      <!-- Upper-left facet -->
      <polygon points="144,170 256,210 196,310 88,250" fill="url(#face-a)" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>

      <!-- Upper-right facet -->
      <polygon points="368,170 424,250 316,310 256,210" fill="url(#face-b)" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>

      <!-- Lower-left facet -->
      <polygon points="88,250 196,310 160,400 120,360" fill="url(#face-e)" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

      <!-- Lower-right facet -->
      <polygon points="424,250 392,360 352,400 316,310" fill="url(#face-c)" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

      <!-- Bottom-left facet -->
      <polygon points="160,400 256,440 196,310 120,360" fill="url(#face-a)" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" opacity="0.8"/>

      <!-- Bottom-right facet -->
      <polygon points="352,400 316,310 256,440 392,360" fill="url(#face-b)" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" opacity="0.8"/>

      <!-- Center bottom facet -->
      <polygon points="196,310 316,310 256,440" fill="url(#face-d)" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" opacity="0.6"/>

      <!-- Center facet (the heart of the crystal) -->
      <polygon points="256,210 316,310 196,310" fill="url(#face-a)" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1" opacity="0.9"/>
    </g>

    <!-- Light refraction lines -->
    <g opacity="0.15">
      <line x1="256" y1="72" x2="256" y2="440" stroke="#ffffff" stroke-width="0.5"/>
      <line x1="88" y1="250" x2="424" y2="250" stroke="#ffffff" stroke-width="0.5"/>
    </g>

    <!-- Highlight on top facet (light reflection) -->
    <polygon points="256,82 340,160 256,195 172,160" fill="#ffffff" fill-opacity="0.06"/>

    <!-- Sparkle accents -->
    <g opacity="0.7">
      <!-- Top sparkle -->
      <line x1="256" y1="60" x2="256" y2="48" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="250" y1="54" x2="262" y2="54" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>

      <!-- Side sparkle -->
      <circle cx="430" cy="190" r="2" fill="#ffffff" opacity="0.5"/>
      <circle cx="82" cy="290" r="1.5" fill="#ffffff" opacity="0.4"/>
    </g>
  </g>

  <!-- Outer border -->
  <rect width="512" height="512" rx="115" ry="115" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
</svg>