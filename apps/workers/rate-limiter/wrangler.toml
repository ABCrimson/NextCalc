#:schema node_modules/wrangler/config-schema.json
name = "nextcalc-rate-limiter"
main = "src/index.ts"
compatibility_date = "2026-02-15"
compatibility_flags = ["nodejs_compat"]

# Observability and monitoring
[observability]
enabled = true

# KV namespace bindings for rate limit storage
[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "65390e47b1ca4604bd58e5c4078e063b"
preview_id = "65390e47b1ca4604bd58e5c4078e063b" # Using production namespace for preview; create a separate preview namespace if needed

# Development configuration
[env.development]
name = "nextcalc-rate-limiter-dev"

[[env.development.kv_namespaces]]
binding = "RATE_LIMITS"
id = "65390e47b1ca4604bd58e5c4078e063b" # Shared with production; create a separate dev namespace if needed

# Production configuration
[env.production]
name = "nextcalc-rate-limiter-prod"

[[env.production.kv_namespaces]]
binding = "RATE_LIMITS"
id = "65390e47b1ca4604bd58e5c4078e063b"

# Resource limits
[limits]
cpu_ms = 50

# CORS configuration and shared variables
[vars]
ALLOWED_ORIGINS = "http://localhost:3020,https://nextcalc.pro"
ADMIN_KEY = "" # TODO: Set via wrangler secret put ADMIN_KEY
