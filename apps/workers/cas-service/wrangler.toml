#:schema node_modules/wrangler/config-schema.json
name = "nextcalc-cas-service"
main = "src/index.ts"
compatibility_date = "2026-02-15"
compatibility_flags = ["nodejs_compat"]

# Observability and monitoring
[observability]
enabled = true

# Custom domain routing
[[routes]]
pattern = "cas.nextcalc.io"
custom_domain = true

# Development configuration
[env.development]
name = "nextcalc-cas-service-dev"

# Production configuration
[env.production]
name = "nextcalc-cas-service-prod"

# Build configuration
[build]
command = ""

# CORS configuration for API access
[vars]
ALLOWED_ORIGINS = "http://localhost:3020,https://nextcalc.io,https://nextcalc.pro"
