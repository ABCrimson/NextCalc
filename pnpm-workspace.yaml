packages:
  - 'apps/*'
  - 'apps/workers/*'
  - 'packages/*'

allowBuilds:
  '@apollo/protobufjs': true
  '@parcel/watcher': true
  '@prisma/engines': true
  '@sentry/cli': true
  '@swc/core': true
  esbuild: true
  prisma: true
  sharp: true
  workerd: true

# Force a single React copy (deduplicate the 19.3 canary across all consumers).
# rxjs: force 8 for @apollo/client (its runtime is rxjs-8-compatible; the <8 peer pin is cosmetic).
overrides:
  react: '19.3.0-canary-99e86060-20260623'
  react-dom: '19.3.0-canary-99e86060-20260623'
  rxjs: '8.0.0-alpha.14'
  # graphql 17: force across graphql-sse/@apollo/server/graphql-ws (all peer-pin <=16);
  # their code uses graphql's public API, which is 17-compatible (no @defer in this app).
  graphql: '17.0.1'

# Silence the cosmetic peer-range warnings for the forced majors above.
peerDependencyRules:
  allowedVersions:
    rxjs: '8'
    graphql: '17'
