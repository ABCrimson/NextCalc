packages:
  - 'apps/*'
  - 'apps/workers/*'
  - 'packages/*'

allowBuilds:
  '@apollo/protobufjs': true
  '@parcel/watcher': true
  '@prisma/engines': true
  '@sentry/cli': true
  '@swc/core': true
  esbuild: true
  prisma: true
  sharp: true
  workerd: true

# Force a single React copy (deduplicate the 19.3 canary across all consumers).
overrides:
  react: '19.3.0-canary-99e86060-20260623'
  react-dom: '19.3.0-canary-99e86060-20260623'
